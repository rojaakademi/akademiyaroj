<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademîya Roj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #06090d; font-family: 'Ubuntu Mono', monospace; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { position: fixed; inset: 0; z-index: 0; }
        nav { position: fixed; top: 1.8rem; left: 2rem; z-index: 10; display: flex; gap: 2.5rem; background: rgba(6,9,13,.6); backdrop-filter: blur(12px); padding: .6rem 1.6rem; border-radius: 30px; border: 1px solid rgba(60,90,25,.25); }
        nav a { color: #4a5e2e; font-size: 0.8rem; text-decoration: none; letter-spacing: 1px; transition: color .2s; }
        nav a:hover { color: #8a9e52; }
        .card { position: relative; z-index: 1; display: flex; align-items: center; gap: 5rem; animation: appear 1s ease both; }
        @keyframes appear { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        .avatar { width: 210px; height: 210px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid #3a4e20; box-shadow: 0 0 0 10px rgba(30,50,10,.28), 0 0 70px rgba(60,90,20,.22); }
        .right { display: flex; flex-direction: column; justify-content: center; gap: .7rem; }
        .name { font-family: 'Righteous', cursive; font-size: 3.8rem; color: #2d5a1b; letter-spacing: 1px; line-height: 1; }
        .quote { font-size: .78rem; color: #ffffff; letter-spacing: .5px; line-height: 1.7; font-style: italic; }
        .icons { display: flex; gap: .85rem; padding-top: .3rem; }
        .icons a { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 50%; background: rgba(80,110,30,.15); border: 1px solid rgba(80,110,30,.3); color: #7a9040; font-size: 1.3rem; text-decoration: none; transition: background .2s, color .2s, transform .2s, border-color .2s; }
        .icons a:hover { background: rgba(100,140,35,.28); border-color: rgba(120,160,50,.6); color: #b0c870; transform: translateY(-3px); }
        .clock { font-size: .72rem; color: #2e3e1a; display: flex; align-items: center; gap: .4rem; letter-spacing: .5px; }
        @media (max-width: 700px) { body { overflow-y: auto; height: auto; padding: 5rem 1.5rem 3rem; } .card { flex-direction: column; text-align: center; gap: 1.8rem; } .avatar { width: 150px; height: 150px; } .name { font-size: 2.8rem; } .icons { justify-content: center; } }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<nav>
    <a href="index.html">home</a>
    <a href="projects.html">PDFs</a>
</nav>
<div class="card">
    <img src="roj.jpg" class="avatar" alt="Akademîya Roj" onerror="this.style.display='none'">
    <div class="right">
        <div class="name">Akademîya Roj</div>
        <div class="quote">"Çözümlenen an değil tarihtir;<br>kişi değil toplumdur."</div>
        <div class="icons">
            <a href="https://instagram.com/akademiyaroj" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://twitter.com/akademiyaroj" target="_blank" title="X / Twitter"><i class="fab fa-x-twitter"></i></a>
            <a href="https://t.me/akademiyaroj" target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
            <a href="mailto:akademiyaroj@proton.me" title="E-posta"><i class="fas fa-envelope"></i></a>
        </div>
        <div class="clock"><i class="far fa-clock"></i><span id="clk">—</span></div>
    </div>
</div>
<script>
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');let W,H;const mx={x:-999,y:-999},pts=[];const N=120,DIST=150,MDIST=190;
function resize(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;}
class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;this.sz=Math.random()*2+.5;this.a=Math.random()*.55+.2;}move(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx.fillStyle=`rgba(90,120,45,${this.a})`;ctx.fill();}}
function init(){resize();pts.length=0;for(let i=0;i<N;i++)pts.push(new P());}
function loop(){ctx.clearRect(0,0,W,H);for(let i=0;i<pts.length;i++){pts[i].move();pts[i].draw();for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.hypot(dx,dy);if(d<DIST){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(60,90,25,${(1-d/DIST)*.25})`;ctx.lineWidth=.8;ctx.stroke();}}const dx=pts[i].x-mx.x,dy=pts[i].y-mx.y,d=Math.hypot(dx,dy);if(d<MDIST){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(mx.x,mx.y);ctx.strokeStyle=`rgba(100,140,45,${(1-d/MDIST)*.6})`;ctx.lineWidth=.8;ctx.stroke();}}requestAnimationFrame(loop);}
window.addEventListener('resize',resize);window.addEventListener('mousemove',e=>{mx.x=e.clientX;mx.y=e.clientY;});window.addEventListener('mouseleave',()=>{mx.x=-999;mx.y=-999;});window.addEventListener('touchmove',e=>{mx.x=e.touches[0].clientX;mx.y=e.touches[0].clientY;},{passive:true});
init();loop();
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function tick(){const n=new Date();let h=n.getHours(),suf=h>=12?'PM':'AM';h=h%12||12;const m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');document.getElementById('clk').textContent=`${DAYS[n.getDay()]}, ${MONS[n.getMonth()]} ${n.getDate()} • ${h}:${m}:${s} ${suf}`;}
tick();setInterval(tick,1000);
</script>
</body>
</html>
