            "interactivity": { "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" } }, "modes": { "repulse": { "distance": 100 }, "push": { "particles_nb": 4 } } },
            "retina_detect": true
        });
        function updateClock() { const now = new Date(); const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December']; const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']; const day = days[now.getDay()], month = months[now.getMonth()], date = now.getDate(); let hours = now.getHours(); const minutes = String(now.getMinutes()).padStart(2, '0'), seconds = String(now.getSeconds()).padStart(2, '0'); const ampm = hours >= 12 ? 'PM' : 'AM'; hours = hours % 12 || 12; document.getElementById('clock-display').textContent = `${day}, ${month} ${date} • ${hours}:${minutes}:${seconds} ${ampm}`; }
        updateClock(); setInterval(updateClock, 1000);
